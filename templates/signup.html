{% extends "layout.html" %}
{% block content %}
<div class="page signup-page">
        <div class="login-container">
            <h2>Sign Up</h2>
            <p>Create a free account now!</p>
            
            <form action="/signup.html" method="POST">
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" name="username" placeholder="Username" id="username" required minlength="3" maxlength="20"/>
                </div>
                
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" name="email" placeholder="Email" id="email" required/>
                </div>

                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" name="password" placeholder="Password" class="input__field" pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number one uppercase letter and at least 8 or more characters" required>

                </div>

                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Sign Up</button>
                <button type="button">Sign Up Using Google</button>
            </form>

            <p>Already Have An Account? <a href="/login.html">Login</a></p>
        </div>
    </div>

{% endblock %}
